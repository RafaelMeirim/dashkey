#
# Dashkey Sites Configuration
# ---------------------------
#
# This file defines the dashboard categories and links.
#
# Each category contains a list of items.
#
# Basic structure:
#
# categories:
#   - name: Category Name
#     items:
#       - name: Site Name
#         url: https://example.com
#         icon: auto
#         keywords: [search, tags]
#
#
# Available fields:
#
# name       -> Display name
# url        -> Target URL
# icon       -> Icon source (see options below)
# iconmode   -> CSS styling for icons
# keywords   -> Search keywords
# secret     -> Hide item unless secret mode is enabled
#
#
# --------------------------------------------------------
# ICON TYPES
# --------------------------------------------------------
#
# icon: auto
#    Automatically fetches the favicon from the site.
#
# icon: lucide-name
#    Uses a Lucide icon (see list in IconRenderer.php)
#
# icon: github
#    Uses SimpleIcons
#
# icon: https://example.com/icon.png
#    Uses a custom icon URL
#
#
# --------------------------------------------------------
# ICON PRIORITY
# --------------------------------------------------------
#
# Icons are rendered in this priority order:
#
# 1. Explicit Lucide icon
# 2. Custom URL
# 3. SimpleIcons
# 4. Automatic favicon
#
#
# Example:
#
# icon: github
# -> loads SimpleIcons github logo
#
# icon: book
# -> loads Lucide book icon
#
# icon: https://example.com/icon.png
# -> loads custom image
#
# icon: auto
# -> loads website favicon
#
#
# --------------------------------------------------------
# ICON MODES (CSS)
# --------------------------------------------------------
#
# Optional styling:
#
# iconmode: black
# iconmode: mono
# iconmode: invert
# iconmode: color
#
# Example:
#
# icon: github
# iconmode: mono
#
#
# --------------------------------------------------------
# SECRET ITEMS
# --------------------------------------------------------
#
# secret: true
#
# Hides items unless secret mode is enabled.
#
#

categories:

#
# --------------------------------------------------------
# Artificial Intelligence
# --------------------------------------------------------
#

  - name: AI
    items:
      - name: ChatGPT
        url: https://chatgpt.com/
        icon: auto
        keywords: [openai, gpt]

      - name: Gemini
        url: https://gemini.google.com/
        icon: auto
        keywords: [google, ai]

      - name: Perplexity
        url: https://www.perplexity.ai/
        icon: perplexity

      - name: DeepSeek
        url: https://chat.deepseek.com/
        icon: auto

      - name: Grok
        url: https://grok.com/
        icon: auto
        iconmode: black


#
# --------------------------------------------------------
# Finance
# --------------------------------------------------------
#

  - name: Finance
    items:
      - name: App Sobrou
        url: https://appsobrou.com.br/
        icon: https://appsobrou.com.br/images/favicon.ico
        keywords: [stocks, finance]

